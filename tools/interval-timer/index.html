<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0f0f10" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Timer d'intervalles" />
  <meta name="description" content="Minuteur d'intervalles pour le HIIT et le fractionné : lancez votre séance et concentrez-vous sur l'effort, plus sur le chrono. Des signaux nets à chaque changement travail/repos, en plein écran et mains libres. Hors-ligne." />
  <title>Timer d'intervalles HIIT — minuteur d'entraînement</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2316a34a'/%3E%3Ccircle cx='50' cy='54' r='23' fill='none' stroke='white' stroke-width='5.5'/%3E%3Cpath d='M50 36v18l12 9' stroke='white' stroke-width='5.5' stroke-linecap='round' fill='none'/%3E%3Crect x='43' y='22' width='14' height='5.5' rx='1.5' fill='white'/%3E%3C/svg%3E" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <!-- Barre PWA : invite d'installation / de mise à jour (masquée tant que non éligible) -->
    <div class="app-bar" id="app-bar" role="status" hidden>
      <span class="app-bar-text" id="app-bar-text"></span>
      <button type="button" class="app-bar-action" id="app-bar-action" hidden></button>
      <button type="button" class="app-bar-close" id="app-bar-close" aria-label="Masquer">✕</button>
    </div>

    <!-- LIST -->
    <section class="screen active" id="screen-list">
      <header class="header">
        <h1>Mes timers</h1>
        <button class="icon-btn" id="btn-new" aria-label="Nouveau">+</button>
      </header>
      <div id="list-container" class="list-container"></div>
    </section>

    <!-- EDIT -->
    <section class="screen" id="screen-edit">
      <header class="header">
        <button class="icon-btn" id="btn-back-edit" aria-label="Retour">←</button>
        <h1 id="edit-title">Nouveau</h1>
        <div class="spacer-44"></div>
      </header>

      <div class="field">
        <label for="f-name">Nom</label>
        <input type="text" id="f-name" placeholder="ex: HIIT matinal" autocomplete="off" />
      </div>

      <div class="field">
        <label for="f-work">Temps de travail (sec)</label>
        <div class="stepper">
          <button type="button" data-step="f-work" data-delta="-5" aria-label="Diminuer">−</button>
          <input type="number" id="f-work" inputmode="numeric" min="1" max="3600" value="30" />
          <button type="button" data-step="f-work" data-delta="5" aria-label="Augmenter">+</button>
        </div>
      </div>

      <div class="field">
        <label for="f-rest">Temps de repos (sec)</label>
        <div class="stepper">
          <button type="button" data-step="f-rest" data-delta="-5" aria-label="Diminuer">−</button>
          <input type="number" id="f-rest" inputmode="numeric" min="0" max="3600" value="15" />
          <button type="button" data-step="f-rest" data-delta="5" aria-label="Augmenter">+</button>
        </div>
      </div>

      <div class="field">
        <label for="f-reps">Nombre de répétitions</label>
        <div class="stepper">
          <button type="button" data-step="f-reps" data-delta="-1" aria-label="Diminuer">−</button>
          <input type="number" id="f-reps" inputmode="numeric" min="1" max="100" value="8" />
          <button type="button" data-step="f-reps" data-delta="1" aria-label="Augmenter">+</button>
        </div>
      </div>

      <button class="primary-btn full-width" id="btn-save">Enregistrer</button>
    </section>

    <!-- RUN -->
    <section class="screen" id="screen-run">
      <div class="runner idle" id="runner">
        <header class="runner-header">
          <button class="icon-btn" id="btn-back-run" aria-label="Quitter">✕</button>
          <div class="runner-title" id="run-title">Timer</div>
          <div class="spacer-44"></div>
        </header>

        <div class="runner-body">
          <div class="phase-label" id="phase">Prêt</div>
          <div class="big-time" id="time">00:30</div>
          <div class="rep-info" id="reps">Répétition 1 / 8</div>
          <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        </div>

        <div class="runner-controls">
          <button type="button" id="btn-reset">Réinitialiser</button>
          <button type="button" class="play" id="btn-play">Démarrer</button>
        </div>
      </div>
    </section>
  </div>

  <script src="./app.js"></script>
</body>
</html>
