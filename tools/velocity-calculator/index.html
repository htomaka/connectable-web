                "name": "Comment calculer la capacité d'un sprint ?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "La capacité de sprint se calcule en multipliant la vélocité de référence par le ratio de disponibilité de l'équipe, en tenant compte des absences et du pourcentage de temps alloué au build."
                }
            },
            {
                "@type": "Question",
                "name": "Qu'est-ce que la vélocité de référence ?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "La vélocité de référence est le nombre moyen de story points qu'une équipe complète peut réaliser pendant un sprint avec tous les développeurs disponibles."
                }
            },
            {
                "@type": "Question",
                "name": "Comment les absences affectent-elles la capacité ?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Les absences réduisent la capacité proportionnellement au nombre de jours manqués par rapport aux jours ouvrés totaux du sprint."
                }

<body class="bg-slate-50 min-h-screen">
<div itemscope itemtype="https://schema.org/WebApplication" class="max-w-4xl mx-auto px-4 py-8">
    <header class="mb-6">
        <h1 itemprop="name" class="text-2xl font-semibold text-slate-900">
            Calculateur de capacité de sprint
        </h1>
        <p itemprop="description" class="mt-1 text-sm text-slate-600">
            Basé sur la vélocité de référence, les jours ouvrés du sprint et les absences par développeur.
        </p>
    </header>

    <section itemprop="featureList" class="bg-white shadow-sm rounded-xl border border-slate-200 p-6 mb-6">
        <h2 class="text-sm font-semibold text-slate-800 mb-3">
            Paramètres du sprint
        </h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">
                    Vélocité de référence du sprint (équipe complète)
                </label>
                <input
                        type="number"
                        id="velocity"
                        value="22"
                        step="0.1"
                        min="0"
                        max="1000"
                        aria-label="Vélocité de référence du sprint"
                        aria-describedby="velocity-help"
                        itemprop="value"
                        class="w-full px-3 py-2 rounded-lg border border-slate-300 bg-white text-sm focus:border-indigo-500 focus:ring-indigo-500"
                />
                <div id="velocity-help" class="sr-only">
                    Entrez la vélocité moyenne de votre équipe en story points
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">
                    Nombre de développeurs dans l'équipe
                </label>
                <input
                        type="number"
                        id="devCount"
                        value="3"
                        min="1"
                        max="50"
                        aria-label="Nombre de développeurs dans l'équipe"
                        itemprop="value"
                        class="w-full px-3 py-2 rounded-lg border border-slate-300 bg-white text-sm focus:border-indigo-500 focus:ring-indigo-500"
                />
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">
                    Jours ouvrés du sprint
                </label>
                <input
                        type="number"
                        id="sprintDays"
                        value="10"
                        min="1"
                        aria-label="Jours ouvrés du sprint"
                        itemprop="value"
                        class="w-full px-3 py-2 rounded-lg border border-slate-300 bg-white text-sm focus:border-indigo-500 focus:ring-indigo-500"
                />
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">
                    Pourcentage de temps dédié au développement
                </label>
                <div class="flex items-center gap-2">
                    <input
                            type="number"
                            id="buildPercent"
                            value="80"
                            min="0"
                            max="100"
                            aria-label="Pourcentage dédié au build"
                            itemprop="value"
                            class="w-24 px-3 py-2 rounded-lg border border-slate-300 bg-white text-sm focus:border-indigo-500 focus:ring-indigo-500"
                    />
                    <span class="text-sm text-slate-600">%</span>
                </div>
            </div>
        </div>
    </section>

    <section itemprop="featureList" class="bg-white shadow-sm rounded-xl border border-slate-200 p-6 mb-6">
        <h2 class="text-sm font-semibold text-slate-800 mb-3">
            Absences par développeur
        </h2>
        <p class="text-xs text-slate-500 mb-4">
            Indique les absences en jours ouvrés pour ce sprint.
        </p>
        <div id="devs-container" class="space-y-2" itemprop="featureList"></div>
    </section>

    <div class="flex flex-col sm:flex-row items-start sm:items-center gap-3 mb-6">
        <button
                id="calcBtn"
                itemprop="potentialAction"
                class="inline-flex items-center px-4 py-2 rounded-lg bg-indigo-600 text-white text-sm font-medium hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-1"
        >
            Calculer la capacité
        </button>
        <div class="flex items-center gap-2">
            <input
                    type="checkbox"
                    id="rememberSettings"
                    class="w-4 h-4 text-indigo-600 bg-white border-slate-300 rounded focus:ring-indigo-500"
            />
            <label for="rememberSettings" class="text-xs text-slate-600 cursor-pointer">
                Mémoriser mes réglages
            </label>
        </div>
    </div>

    <section
            id="result"
            class="hidden bg-white shadow-sm rounded-xl border border-slate-200 p-6"
            itemprop="result"
    ></section>
</div>

</body>
